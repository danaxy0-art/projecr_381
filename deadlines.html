<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Deadlines</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
 
  <div class="sidebar">
    <h2>Study Planner</h2>
    <a href="dashboard.html">Dashboard</a>
    <a href="courses.html">Courses</a>
    <a href="deadlines.html" class="active">Deadlines</a>
    <a href="availability.html">Availability</a>
    <a href="statistics.html">Statistics</a>
    <a href="index.html">Log out</a>
  </div>
 
  <div class="main">
 
    <h1>Deadlines</h1>
 
    <!-- Add Assignment -->
    <div class="card">
      <h3>Add Assignment</h3>
 
      <label>Course Name</label>
      <input type="text" placeholder="e.g. Math 101">
 
      <label>Assignment Name</label>
      <input type="text" placeholder="e.g. Chapter 3 Homework">
 
      <label>Due Date</label>
      <input type="date">
 
      <button>Add Assignment</button>
    </div>
 
    <!-- Add Exam -->
    <div class="card">
      <h3>Add Exam</h3>
 
      <label>Course Name</label>
      <input type="text" placeholder="e.g. Physics 102">
 
      <label>Exam Name</label>
      <input type="text" placeholder="e.g. Midterm Exam">
 
      <label>Exam Date</label>
      <input type="date">
 
      <button>Add Exam</button>
    </div>
 
    <!-- Deadlines Table -->
    <div class="card">
      <h3>All Deadlines</h3>
 
      <table>
        <tr>
          <th>Type</th>
          <th>Course</th>
          <th>Name</th>
          <th>Due Date</th>
          <th>Days Left</th>
          <th>Priority</th>
          <th>Action</th>
        </tr>
        <tr>
          <td>Assignment</td>
          <td>Math 101</td>
          <td>Chapter 3 Homework</td>
          <td>2026-04-10</td>
          <td>6 days</td>
          <td>Medium</td>
          <td><button class="delete">Delete</button></td>
        </tr>
        <tr>
          <td>Exam</td>
          <td>Physics 102</td>
          <td>Midterm Exam</td>
          <td>2026-04-07</td>
          <td>3 days</td>
          <td>High</td>
          <td><button class="delete">Delete</button></td>
        </tr>
      </table>
    </div>
 
  </div>
 
</body>
</html>
</html>
