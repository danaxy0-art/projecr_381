<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STUDY SYNC</title>

<link rel="stylesheet" href="style2.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<!-- Overlay -->
<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

<div class="container">

    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">


        <img src="images/profile.png" class="profile" alt="Profile" onclick="goProfile()">

        <button class="logout-btn" onclick="logout()">Logout</button>

    </div>

    <!-- Main -->
    <div class="main">

        <!-- Header -->
        <div class="header">

            <h1>STUDY SYNC</h1>

            <div class="header-button">
                <button onclick="goLogin()">login</button>
            </div>

            <img src="c:\Users\danam\Desktop\web project\Screenshot 2026-03-03 213510.png" class="logo" alt="Logo">
        </div>

        <!-- Hero -->
        <section class="hero">
            <h2>Welcome!</h2>
                <p>Easily organize your time and lessons with  advanced control panel and educational services.</p>            
            <button onclick="goLogin('ابدأ الآن!')">start now</button>
        </section>

        <!-- Services -->
        <section class="section">
            <h3>Our services</h3>

            <div class="cards">
                <div class="card">Organizing lessons and appointments</div>
                <div class="card">Follow up on courses and assignments</div>
                <div class="card">Flexible weekly plans</div>
            </div>
        </section>

        <footer>
             Copyright &copy; 2026 STUDY SYNC
        </footer>

    </div>
</div>

<script>
function toggleSidebar(){
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('overlay');

    if(sidebar.style.left === "0px"){
        sidebar.style.left = "-250px";
        overlay.classList.remove("active");
    } else {
        sidebar.style.left = "0px";
        overlay.classList.add("active");
    }
}

function goLogin(){
    window.location.href = "singUp.html";
}


function logout(){
    localStorage.removeItem("user");
    alert("Logged out");
}
</script>

</body>
</html>
